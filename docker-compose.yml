version: '3.8'

services:
  blockchain_api:
    build: .
    command: uvicorn app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"

  agent_traffic:
    build: .
    command: python agents.py
    depends_on:
      - blockchain_api
    environment:
      - API_URL=http://blockchain_api:8000

  soc_dashboard:
    build: .
    command: streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - blockchain_api
